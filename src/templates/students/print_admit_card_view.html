{%  extends "base.html" %}
{% load tailwind_filters %}

{% block title %}Admit Card{% endblock title %}

{% block content %}
      <h2 class="text-xl font-bold mb-4">Print Admit Cards Of Students.</h2>
    <form hx-post="{% url 'print_admit_card' %}" hx-target="#admit-cards" hx-swap="innerHTML">
        {{ form|crispy }}
    <button type="submit"
    class="bg-blue-500 inline-block hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg transition-colors">Load</button>
    </form>

    <div id="admit-cards"></div>
{% endblock content %}
